<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Little Bear Lost</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #0e1a14;
      font-family: Arial, sans-serif;
    }

    #objective {
      position: fixed;
      top: 18px;
      left: 22px;
      color: #ffe680;
      font-size: 22px;
      z-index: 20;
      text-shadow: 0 0 10px rgba(0,0,0,0.9);
      pointer-events: none;
    }

    #storyText {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 42px;
      text-align: center;
      color: white;
      font-size: 28px;
      z-index: 20;
      text-shadow: 0 0 14px rgba(0,0,0,0.95);
      padding: 0 28px;
      pointer-events: none;
    }

    #help {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 10px;
      text-align: center;
      color: #d2e6d1;
      font-size: 14px;
      z-index: 20;
      text-shadow: 0 0 8px rgba(0,0,0,0.9);
      opacity: 0.85;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="objective">Objective: Wake up.</div>
  <div id="storyText">Loading forest...</div>
  <div id="help">WASD / Arrow Keys = Move • E = Inspect</div>

  <script type="module" src="./game.js"></script>
</body>
</html>
